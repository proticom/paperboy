<!DOCTYPE html>
<html lang="en" data-theme="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paperboy</title>
    <script>
      document.documentElement.dataset.theme = localStorage.getItem("paperboy-theme") || "system";
    </script>
    <link rel="stylesheet" href="./styles/app.css" />
    <link rel="stylesheet" href="./styles/preview.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="header-bar">
        <div class="header-drag-surface" data-window-drag data-tauri-drag-region></div>
        <div class="titlebar-drag" data-window-drag data-tauri-drag-region>
          <div class="filename" data-filename hidden></div>
        </div>
        <div class="header-controls">
          <div class="theme-toggle" data-active="0" role="group" aria-label="Theme">
            <div class="theme-toggle-pill"></div>
            <button aria-label="System theme" title="System" data-theme-btn="system" class="active">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"></rect><line x1="8" x2="16" y1="21" y2="21"></line><line x1="12" x2="12" y1="17" y2="21"></line></svg>
            </button>
            <button aria-label="Light theme" title="Light" data-theme-btn="light">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>
            </button>
            <button aria-label="Dark theme" title="Dark" data-theme-btn="dark">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"></path></svg>
            </button>
          </div>
          <div class="view-toggle" data-active="1" role="group" aria-label="View mode">
            <div class="view-toggle-pill"></div>
            <button data-view="preview" title="Preview" aria-label="Preview">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
            <button class="active" data-view="editor" title="Editor" aria-label="Editor">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
            </button>
            <button data-view="split" title="Split" aria-label="Split view">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"></rect><path d="M12 3v18"></path></svg>
            </button>
          </div>
        </div>
      </header>

      <nav class="tab-bar" data-tab-bar data-window-drag></nav>

      <div class="toolbar" data-toolbar>
        <div class="toolbar-group">
          <button data-action="prefix" data-syntax="# " title="Heading 1" aria-label="Heading 1">
            <svg class="toolbar-symbol" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"></path><path d="M19 18v-8l-2 2"></path><path d="M4 6v12"></path><path d="M12 6v12"></path><path d="M11 18h2"></path><path d="M3 18h2"></path><path d="M4 12h8"></path><path d="M3 6h2"></path><path d="M11 6h2"></path></svg>
          </button>
          <button data-action="prefix" data-syntax="## " title="Heading 2" aria-label="Heading 2">
            <svg class="toolbar-symbol" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"></path><path d="M17 12a2 2 0 1 1 4 0c0 .591 -.417 1.318 -.816 1.858l-3.184 4.143l4 0"></path><path d="M4 6v12"></path><path d="M12 6v12"></path><path d="M11 18h2"></path><path d="M3 18h2"></path><path d="M4 12h8"></path><path d="M3 6h2"></path><path d="M11 6h2"></path></svg>
          </button>
          <button data-action="prefix" data-syntax="### " title="Heading 3" aria-label="Heading 3">
            <svg class="toolbar-symbol" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"></path><path d="M19 14a2 2 0 1 0 -2 -2"></path><path d="M17 16a2 2 0 1 0 2 -2"></path><path d="M4 6v12"></path><path d="M12 6v12"></path><path d="M11 18h2"></path><path d="M3 18h2"></path><path d="M4 12h8"></path><path d="M3 6h2"></path><path d="M11 6h2"></path></svg>
          </button>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-group">
          <button data-action="wrap" data-before="**" data-after="**" data-placeholder="bold" title="Bold" aria-label="Bold">
            <svg class="toolbar-symbol" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"></path><path d="M7 5h6a3.5 3.5 0 0 1 0 7h-6l0 -7"></path><path d="M13 12h1a3.5 3.5 0 0 1 0 7h-7v-7"></path></svg>
          </button>
          <button data-action="wrap" data-before="*" data-after="*" data-placeholder="italic" title="Italic" aria-label="Italic">
            <svg class="toolbar-symbol" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"></path><path d="M11 5l6 0"></path><path d="M7 19l6 0"></path><path d="M14 5l-4 14"></path></svg>
          </button>
          <button data-action="wrap" data-before="~~" data-after="~~" data-placeholder="strike" title="Strikethrough" aria-label="Strikethrough">
            <svg class="toolbar-symbol" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"></path><path d="M5 12l14 0"></path><path d="M16 6.5a4 2 0 0 0 -4 -1.5h-1a3.5 3.5 0 0 0 0 7h2a3.5 3.5 0 0 1 0 7h-1.5a4 2 0 0 1 -4 -1.5"></path></svg>
          </button>
          <button data-action="wrap" data-before="==" data-after="==" data-placeholder="highlight" title="Highlight" aria-label="Highlight">
            <svg class="toolbar-symbol" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"></path><path d="M3 19h4l10.5 -10.5a2.828 2.828 0 1 0 -4 -4l-10.5 10.5v4"></path><path d="M12.5 5.5l4 4"></path><path d="M4.5 13.5l4 4"></path><path d="M21 15v4h-8l4 -4l4 0"></path></svg>
          </button>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-group">
          <button data-action="prefixToggle" data-syntax="> " title="Blockquote" aria-label="Blockquote">
            <svg class="toolbar-symbol" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"></path><path d="M6 15h15"></path><path d="M21 19h-15"></path><path d="M15 11h6"></path><path d="M21 7h-6"></path><path d="M9 9h1a1 1 0 1 1 -1 1v-2.5a2 2 0 0 1 2 -2"></path><path d="M3 9h1a1 1 0 1 1 -1 1v-2.5a2 2 0 0 1 2 -2"></path></svg>
          </button>
          <button data-action="insert" data-syntax="\n---\n" title="Horizontal Rule" aria-label="Horizontal Rule"><span class="toolbar-rule-glyph" aria-hidden="true"></span></button>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-group">
          <button data-action="prefix" data-syntax="- " title="Bullet List" aria-label="Bullet List">
            <svg class="toolbar-symbol" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path stroke="none" d="M0 0h24v24H0z" fill="none"></path><path d="M21 6a1 1 0 0 1 -1 1h-10a1 1 0 1 1 0 -2h10a1 1 0 0 1 1 1"></path><path d="M21 12a1 1 0 0 1 -1 1h-10a1 1 0 0 1 0 -2h10a1 1 0 0 1 1 1"></path><path d="M21 18a1 1 0 0 1 -1 1h-10a1 1 0 0 1 0 -2h10a1 1 0 0 1 1 1"></path><path d="M7 5.995v.02c0 1.099 -.895 1.99 -2 1.99s-2 -.891 -2 -1.99v-.02c0 -1.099 .895 -1.99 2 -1.99s2 .891 2 1.99"></path><path d="M7 11.995v.02c0 1.099 -.895 1.99 -2 1.99s-2 -.891 -2 -1.99v-.02c0 -1.099 .895 -1.99 2 -1.99s2 .891 2 1.99"></path><path d="M7 17.995v.02c0 1.099 -.895 1.99 -2 1.99s-2 -.891 -2 -1.99v-.02c0 -1.099 .895 -1.99 2 -1.99s2 .891 2 1.99"></path></svg>
          </button>
          <button data-action="prefix" data-syntax="1. " title="Ordered List" aria-label="Ordered List">
            <svg class="toolbar-symbol" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"></path><path d="M11 6h9"></path><path d="M11 12h9"></path><path d="M12 18h8"></path><path d="M4 16a2 2 0 1 1 4 0c0 .591 -.5 1 -1 1.5l-3 2.5h4"></path><path d="M6 10v-6l-2 2"></path></svg>
          </button>
          <button data-action="prefix" data-syntax="- [ ] " title="Task List" aria-label="Task List">
            <svg class="toolbar-symbol" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path stroke="none" d="M0 0h24v24H0z" fill="none"></path><path d="M8.207 3.793a1 1 0 0 1 0 1.414l-2.5 2.5a1 1 0 0 1 -1.414 0l-1.5 -1.5a1 1 0 0 1 1.414 -1.414l.793 .793l1.793 -1.793a1 1 0 0 1 1.414 0"></path><path d="M8.207 9.793a1 1 0 0 1 0 1.414l-2.5 2.5a1 1 0 0 1 -1.414 0l-1.5 -1.5a1 1 0 0 1 1.414 -1.414l.793 .793l1.793 -1.793a1 1 0 0 1 1.414 0"></path><path d="M8.207 15.793a1 1 0 0 1 0 1.414l-2.5 2.5a1 1 0 0 1 -1.414 0l-1.5 -1.5a1 1 0 0 1 1.414 -1.414l.793 .793l1.793 -1.793a1 1 0 0 1 1.414 0"></path><path d="M21 6a1 1 0 0 1 -1 1h-9a1 1 0 0 1 0 -2h9a1 1 0 0 1 1 1"></path><path d="M21 12a1 1 0 0 1 -1 1h-9a1 1 0 0 1 0 -2h9a1 1 0 0 1 1 1"></path><path d="M21 18a1 1 0 0 1 -1 1h-9a1 1 0 0 1 0 -2h9a1 1 0 0 1 1 1"></path></svg>
          </button>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-group">
          <button data-action="wrap" data-before="`" data-after="`" data-placeholder="code" title="Inline Code" aria-label="Inline Code">
            <svg class="toolbar-symbol" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 3 12 9 6"></polyline>
              <polyline points="15 6 21 12 15 18"></polyline>
            </svg>
          </button>
          <button data-action="blockWrap" data-before="```\n" data-after="\n```" data-placeholder="code block" title="Code Block" aria-label="Code Block">
            <svg class="toolbar-symbol" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"></path><path d="M5 4l-2 2l2 2"></path><path d="M12 4l2 2l-2 2"></path><path d="M8 8l1 -4"></path><path d="M17 6a2 2 0 0 1 2 2v10a2 2 0 0 1 -2 2h-10a2 2 0 0 1 -2 -2v-7"></path></svg>
          </button>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-group icon-buttons">
          <button data-action="link" title="Link" aria-label="Link">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07L11.8 5"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07L12.2 19"></path></svg>
          </button>
          <button data-action="image" title="Image" aria-label="Image">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="9" cy="9" r="2"></circle><path d="m21 15-3.09-3.09a2 2 0 0 0-2.82 0L6 21"></path></svg>
          </button>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-group">
          <button data-action="insert" data-syntax="| Column | Value |\n| --- | --- |\n| Item | Detail |\n| Item | Detail |" title="Table" aria-label="Table">
            <svg class="toolbar-symbol" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"></path><path d="M3 5a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v14a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2v-14"></path><path d="M3 10h18"></path><path d="M10 3v18"></path></svg>
          </button>
          <button data-action="footnote" title="Footnote" aria-label="Footnote">
            <svg class="toolbar-symbol" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"></path><path d="M6 19a2 2 0 0 1 -2 -2v-4l-1 -1l1 -1v-4a2 2 0 0 1 2 -2"></path><path d="M12 11.875l3 -1.687"></path><path d="M12 11.875v3.375"></path><path d="M12 11.875l-3 -1.687"></path><path d="M12 11.875l3 1.688"></path><path d="M12 8.5v3.375"></path><path d="M12 11.875l-3 1.688"></path><path d="M18 19a2 2 0 0 0 2 -2v-4l1 -1l-1 -1v-4a2 2 0 0 0 -2 -2"></path></svg>
          </button>
          <button data-action="wrap" data-before="^" data-after="^" data-placeholder="sup" title="Superscript">x²</button>
          <button data-action="wrap" data-before="~" data-after="~" data-placeholder="sub" title="Subscript">x₂</button>
        </div>
      </div>

      <main class="content-area" data-view-mode="editor">
        <section class="editor-pane">
          <textarea class="editor" data-editor spellcheck="false" aria-label="Markdown editor"></textarea>
        </section>
        <section class="preview-pane-wrap">
          <article class="preview-pane" data-preview>
            <div class="empty-preview">
              <img src="./assets/paperboy-logo.svg" alt="" class="empty-preview-logo" aria-hidden="true" />
              <p>Open a file or type here to see a preview. Paperboy can import Markdown, PDF, HTML, and other formats.</p>
            </div>
          </article>
        </section>
      </main>

      <footer class="path-footer" data-path-footer data-window-drag hidden>
        <div class="path-footer-text" data-filepath></div>
      </footer>
    </div>

    <script src="./scripts/vendor/markdown-it.min.js"></script>
    <script src="./scripts/vendor/markdown-it-footnote.min.js"></script>
    <script src="./scripts/vendor/markdown-it-deflist.js"></script>
    <script src="./scripts/vendor/markdown-it-mark.min.js"></script>
    <script src="./scripts/vendor/markdown-it-sub.min.js"></script>
    <script src="./scripts/vendor/markdown-it-sup.min.js"></script>
    <script src="./scripts/vendor/markdown-it-task-lists.min.js"></script>
    <script type="module" src="./scripts/bridge.js"></script>
  </body>
</html>
