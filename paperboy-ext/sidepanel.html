<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paperboy</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <div class="app-title-wrap">
          <h1 class="app-title">Paperboy</h1>
          <p class="app-subtitle">Web page to markdown</p>
          <p
            class="converter-version-line"
            id="converter-version-line"
            aria-label="Bundled converter library version"
          ></p>
        </div>
        <div class="actions">
          <div
            class="view-toggle"
            id="view-toggle"
            style="--active-index: 0"
            role="group"
            aria-label="View mode"
          >
            <div class="view-toggle-pill"></div>
            <button
              class="active"
              data-view="source"
              type="button"
              title="Markdown source"
              aria-label="Markdown source"
            >
              <svg
                aria-hidden="true"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="16 18 22 12 16 6"></polyline>
                <polyline points="8 6 2 12 8 18"></polyline>
              </svg>
            </button>
            <button
              data-view="preview"
              type="button"
              title="Rendered preview"
              aria-label="Rendered preview"
            >
              <svg
                aria-hidden="true"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          <button
            id="pick-btn"
            class="action-btn"
            type="button"
            title="Select a region of the page to convert"
          >
            <svg
              aria-hidden="true"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M3 7V5a2 2 0 0 1 2-2h2"></path>
              <path d="M17 3h2a2 2 0 0 1 2 2v2"></path>
              <path d="M21 17v2a2 2 0 0 1-2 2h-2"></path>
              <path d="M7 21H5a2 2 0 0 1-2-2v-2"></path>
              <circle cx="12" cy="12" r="1.5" fill="currentColor"></circle>
            </svg>
            <span id="pick-btn-label">Pick</span>
          </button>
          <button
            id="ocr-btn"
            class="action-btn"
            type="button"
            aria-pressed="false"
            title="Include OCR for images (slower)"
          >
            <svg
              aria-hidden="true"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="5" width="18" height="14" rx="2"></rect>
              <path d="M7 10h2"></path>
              <path d="M11 10h2"></path>
              <path d="M15 10h2"></path>
              <path d="M7 14h6"></path>
            </svg>
            <span id="ocr-btn-label">OCR</span>
          </button>
          <button id="refresh-btn" class="action-btn" type="button">
            <svg
              aria-hidden="true"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 12a9 9 0 1 1-2.64-6.36" />
              <polyline points="21 3 21 9 15 9" />
            </svg>
            <span id="refresh-btn-label">Re-extract</span>
          </button>
          <button id="copy-btn" class="action-btn" type="button" disabled>
            <svg
              class="copy-icon"
              aria-hidden="true"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
            </svg>
            <span id="copy-btn-label">Copy</span>
          </button>
        </div>
      </header>

      <section class="meta" id="meta-text">Waiting for page content...</section>

      <main class="output-wrap">
        <pre id="markdown-output" class="markdown-output"></pre>
        <article id="preview-output" class="preview-output" hidden></article>
      </main>
    </div>

    <noscript>Paperboy needs JavaScript enabled.</noscript>
    <script src="./lib/readability.js"></script>
    <script src="./lib/tesseract/tesseract.min.js"></script>
    <script src="./sidepanel.bundle.js"></script>
  </body>
</html>
