# Publishes @proticom/paperboy-converter to the npm registry.
#
# Before running:
# 1. Bump "version" in paperboy-converter/package.json (and commit to main).
# 2. Add an npm automation token with publish access to the @proticom scope as
#    repository secret NPM_TOKEN (Settings → Secrets and variables → Actions).
#
# Optional: configure an npm "Trusted Publisher" for this repo and OIDC instead
# of a long-lived token (https://docs.npmjs.com/trusted-publishers).

name: Publish @proticom/paperboy-converter

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: paperboy-converter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: paperboy-converter/package-lock.json

      - name: Install and test
        run: |
          npm ci
          npm test

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
